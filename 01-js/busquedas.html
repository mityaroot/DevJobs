<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevJobs</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>


<body>
    <header style="padding: 1rem 2rem; flex-wrap: wrap; gap: 0.75rem;">
        <div style="display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;">
            <h1 style="margin: 0; display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0;">
                <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                </svg>
                DevJobs
            </h1>

            <nav>
                <a href="empleos.html" class="nav-link">Empleos</a>
            </nav>
        </div>

        <div style="display: flex; align-items: center; gap: 0.75rem; margin-left: auto; flex-wrap: wrap;">
            <div
                style="border-radius: 25px; padding: 0.5rem 1rem; 
                background-color: #b44cce; color: white; 
                display: flex; justify-content: center; 
                align-items: center;"
            >
                <a href="">Subir CV</a>
            </div>

            <div 
                style="border-radius: 25px; width: 40px; 
                height: 40px; background-color: #b44cce; 
                display: flex; justify-content: center; 
                align-items: center; padding: 0;
                "
                >

                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-user">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0" />
                    <path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2" />
                </svg>
            </div>
        </div>

    </header>


  <main>

    <section class="hero">
        <img src="../resources/background.webp" width="200" />

        <h1>Encuentra tú próximo trabajo</h1>

        <p>Explora miles de oportunidades en el sector tecnológico.</p>

        <form role="search">
            <div>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                    class="icon icon-tabler icons-tabler-outline icon-tabler-search">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
                    <path d="M21 21l-6 -6" />
                </svg>

                <input 
                id="empleos-search-input"
                required type="text" 
                placeholder="Buscar trabajos, empresas o habilidades"
                
                style="padding: 0.5rem 1rem; border: none; border-radius: 
                4px; width: 300px; max-width: 100%;"
                />
            </div>
        </form>
       

    <div 
    class="search-filters"
        style="display: flex; gap: 1.5rem; 
        align-items: center; flex-wrap: wrap;
        margin-top: 1rem; margin-left: 3rem; margin-right: 1rem;
        ">
    
        <button type="button" 
        id="btn-reset-filters" 
            style="display: inline-flex; align-items: center; 
            gap: 0.4rem; padding: 0.5rem 1rem; 
            background-color: #e53e3e; color: white; 
            border: none; border-radius: 4px; cursor: pointer; 
            font-size: 0.85rem;
            ">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
            Limpiar filtros
        </button>

        <!-- Filtro de Tecnología: Basado en data.technology -->
        <select id="filter-technology" name="technology">
            <option value="">Todas las tecnologías</option>
            <option value="react">React</option>
            <option value="node">Node.js</option>
            <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="mobile">Mobile / Otros</option>
        </select>

        <!-- Filtro de Ubicación: Basado en data.modalidad -->
        <select id="filter-location" name="location">
            <option value="">Todas las ubicaciones</option>
            <option value="remoto">Remoto</option>
            <option value="madrid">Madrid</option>
            <option value="barcelona">Barcelona</option>
            <option value="valencia">Valencia</option>
            <option value="cdmx">Ciudad de México</option>
            <option value="guadalajara">Guadalajara</option>
            <option value="monterrey">Monterrey</option>
            <option value="bogota">Bogotá</option>
            <option value="bsas">Buenos Aires</option>
            <option value="santiago">Santiago de Chile</option>
            <option value="lima">Lima</option>
        </select>

        <!-- Filtro de Nivel: Basado en data.level -->
        <select id="experience-level" name="experience-level">
            <option value="">Todos los niveles</option>
            <option value="junior">Junior</option>
            <option value="mid-level">Mid Level</option>
            <option value="senior">Senior</option>
        </select>
    </div>

    </section>


    
    <section 
    style="
        margin-top: 2rem; display: grid; gap: 1rem; 
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        ">

        <div 
        class="job-listing" 
            style="width: 100%; 
            max-width: 650px; border: 4px solid #ffffff2d; 
            border-radius: 4px; padding-bottom: 2rem;
            background-color: #f9f9f94f;

            display: flex; justify-content: center; 
            align-items: center; flex-direction: column;
            ">
            <h2 style="padding: 1rem 1rem 0 1rem; margin-bottom: 1rem;">
                Resultados de búsqueda
            </h2>

            <!-- Aquí se insertarán las ofertas de empleo dinámicamente -->


        </div>

        <nav  
        class="pagination"
        style="margin-top: 2rem;">
        <a href="#">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-chevron-left">
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M15 6l-6 6l6 6" />
            </svg>
        </a>
        <a href="#">1</a>
        <a href="#">2</a>
        <a href="#">3</a>
        <a href="#">4</a>
        <a href="#">5</a>
        <a href="#">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-chevron-right">
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M9 6l6 6l-6 6" />
            </svg>
        </a>
        </nav>

    </section>


</main>


    <footer style="margin-top: 2rem; text-align: center; color: #777;">
    
        <hr style="margin: 2rem auto; width: 50%; border-color: #ccc;">

        <p>&copy; 2024 DevJobs. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
